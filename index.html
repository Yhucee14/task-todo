<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #FAF7F2;
            --warm-white: #FFFDF9;
            --ink: #1A1612;
            --ink-muted: #6B6460;
            --ink-faint: #C4BDB8;
            --accent: #C8502A;
            --accent-light: #F5E8E3;
            --amber: #D4922A;
            --amber-light: #FBF3E2;
            --sage: #4A7C59;
            --sage-light: #E8F2EC;
            --border: rgba(26, 22, 18, 0.09);
            --shadow: 0 2px 4px rgba(26, 22, 18, 0.04), 0 12px 40px rgba(26, 22, 18, 0.10);
            --shadow-hover: 0 4px 8px rgba(26, 22, 18, 0.06), 0 24px 64px rgba(26, 22, 18, 0.18);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-image:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200, 80, 42, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 60% 60% at 80% 90%, rgba(212, 146, 42, 0.06) 0%, transparent 60%);
        }

        /* ── CARD ── */
        .card-wrapper {
            max-width: 460px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            background: var(--warm-white);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
            animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-6px) rotate(-0.3deg);
                box-shadow: var(--shadow-hover);
            }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card.completed .task-title,
        .card.completed .task-desc {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* ── HEADER BAND ── */
        .card-band {
            height: 5px;
            width: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--amber) 100%);
        }

        /* ── BODY ── */
        .card-body {
            padding: 1.5rem 1.5rem 1.25rem;
        }

        @media (min-width: 480px) {
            .card-body {
                padding: 2rem 2rem 1.5rem;
            }
        }

        /* ── TOP ROW ── */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .checkbox-wrap {
            margin-top: 3px;
            flex-shrink: 0;
            position: relative;
            width: 22px;
            height: 22px;
        }

        .checkbox-wrap input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 1.5px solid var(--ink-faint);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .checkbox-wrap input[type="checkbox"]:checked {
            background: var(--sage);
            border-color: var(--sage);
        }

        .checkbox-wrap input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 12px;
            height: 7px;
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(-45deg);
        }

        .title-area {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.0rem, 4vw, 1.30rem);
            font-weight: 700;
            color: var(--ink);
            padding-bottom: 6px;
            line-height: 1.25;
            letter-spacing: -0.01em;
            word-break: break-word;
        }

        .priority-pill {
            flex-shrink: 0;
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
            white-space: nowrap;
        }

        .priority-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .prio-high {
            background: var(--accent-light);
            color: var(--accent);
        }

        .prio-high .priority-dot {
            background: var(--accent);
            animation: throb 1.4s ease-in-out infinite;
        }

        .prio-medium {
            background: var(--amber-light);
            color: var(--amber);
        }

        .prio-medium .priority-dot {
            background: var(--amber);
        }

        .prio-low {
            background: var(--sage-light);
            color: var(--sage);
        }

        .prio-low .priority-dot {
            background: var(--sage);
        }

        @keyframes throb {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.6;
            }
        }

        /* ── PRIORITY INDICATOR (new) ── */
        .priority-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            margin-top: 4px;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.85);
        }

        /* ── DESC & COLLAPSIBLE (new) ── */
        .desc-wrapper {
            margin-bottom: 1.25rem;
        }

        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .collapsible-content:not(.expanded) {
            max-height: 92px;
        }

        .task-desc {
            font-size: 0.875rem;
            color: var(--ink-muted);
            line-height: 1.65;
            word-break: break-word;
        }

        .expand-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent);
            background: transparent;
            border: none;
            padding: 4px 0;
            cursor: pointer;
            width: fit-content;
        }

        .expand-btn .expand-text::after {
            content: ' ▼';
            font-size: 0.9em;
        }

        .expand-btn[aria-expanded="true"] .expand-text::after {
            content: ' ▲';
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
            margin-bottom: 1.25rem;
        }

        /* ── DATE ROW ── */
        .date-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.1rem;
        }

        .date-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 0.2rem;
        }

        .date-value {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.95rem, 3vw, 1.05rem);
            color: var(--ink);
            font-weight: 400;
        }

        .time-chip {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            padding: 0.45rem 0.9rem;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--cream);
            color: var(--ink-muted);
            white-space: nowrap;
            animation: breathe 3s ease-in-out infinite;
        }

        .time-chip.overdue {
            background: #fee2e2 !important;
            color: var(--accent) !important;
            border-color: var(--accent) !important;
            animation: none;
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* ── OVERDUE INDICATOR (new) ── */
        .overdue-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            padding: 0.3rem 0.75rem;
            border-radius: 100px;
            background: #fee2e2;
            color: var(--accent);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(200, 80, 42, 0.1);
        }

        /* ── STATUS ── */
        .status-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
        }

        .status-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }

        .status-control {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.35rem 1rem;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--warm-white);
            color: var(--ink);
            cursor: pointer;
            min-width: 140px;
            transition: border-color 0.18s;
        }

        .status-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(200, 80, 42, 0.1);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.8rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-inprogress {
            background: #EBF3FF;
            color: #3A6EBF;
        }

        .status-inprogress .status-dot {
            background: #3A6EBF;
            animation: pulse-dot 1.8s ease-in-out infinite;
        }

        .status-done {
            background: var(--sage-light);
            color: var(--sage);
        }

        .status-done .status-dot {
            background: var(--sage);
        }

        .status-pending {
            background: var(--amber-light);
            color: var(--amber);
        }

        .status-pending .status-dot {
            background: var(--amber);
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        /* ── TAGS ── */
        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            list-style: none;
        }

        .tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.67rem;
            letter-spacing: 0.04em;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            background: var(--cream);
            border: 1px solid var(--border);
            color: var(--ink-muted);
            cursor: default;
            transition: all 0.18s;
        }

        .tag:hover {
            background: var(--ink);
            color: var(--cream);
            border-color: var(--ink);
        }

        /* ── FOOTER ── */
        .card-footer {
            padding: 0.875rem 1.5rem 1.25rem;
            display: flex;
            gap: 0.6rem;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        @media (min-width: 480px) {
            .card-footer {
                padding: 1rem 2rem 1.5rem;
            }
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 0.55rem 1.1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--ink-muted);
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: 36px;
        }

        @media (max-width: 320px) {
            .card-footer {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }
        }

        .btn:hover {
            background: var(--cream);
            color: var(--ink);
            border-color: var(--ink-faint);
        }

        .btn-danger {
            border-color: rgba(200, 80, 42, 0.2);
            color: var(--accent);
        }

        .btn-danger:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── CLOCK ── */
        .clock-line {
            text-align: center;
            margin-top: 1.25rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--ink-faint);
            letter-spacing: 0.06em;
        }

        /* ── EDIT FORM (inline, replaces modal) ── */
        .edit-form .form-group {
            margin-bottom: 1rem;
        }

        .edit-form .form-label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 0.4rem;
        }

        .edit-form .form-input,
        .edit-form .form-select,
        .edit-form .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            color: var(--ink);
            outline: none;
            transition: border-color 0.18s;
        }

        .edit-form .form-input:focus,
        .edit-form .form-select:focus,
        .edit-form .form-textarea:focus {
            border-color: var(--accent);
        }

        .edit-form .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .edit-form .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        @media (min-width: 380px) {
            .edit-form .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .edit-form .modal-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .btn-cancel,
        .btn-save {
            flex: 1;
            min-width: 100px;
            padding: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.18s;
        }

        .btn-cancel {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--ink-muted);
        }

        .btn-cancel:hover {
            background: var(--cream);
        }

        .btn-save {
            font-weight: 600;
            border: none;
            background: var(--ink);
            color: var(--cream);
        }

        .btn-save:hover {
            background: var(--accent);
        }

        /* ── DELETED NOTICE ── */
        .deleted-notice {
            display: none;
            text-align: center;
            padding: 3rem 1.5rem;
        }

        .deleted-notice.show {
            display: block;
        }

        .deleted-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .deleted-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--ink-muted);
            font-style: italic;
        }

        /* ── TOUCH TARGET BOOST ── */
        @media (pointer: coarse) {
            .btn {
                min-height: 44px;
                padding: 0.65rem 1.1rem;
            }

            .btn-cancel,
            .btn-save {
                min-height: 44px;
            }

            .checkbox-wrap input[type="checkbox"] {
                width: 26px;
                height: 26px;
            }

            .checkbox-wrap {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>

<body>

    <div class="card-wrapper">

        <article id="todo-card" data-testid="test-todo-card" class="card">
            <div class="card-band"></div>
            <div class="card-body">

                <!-- VIEW SECTION (Stage 0 content + new enhancements) -->
                <div id="view-section">

                    <!-- Top Row -->
                    <div class="top-row">
                        <div class="checkbox-wrap">
                            <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
                        </div>
                        <!-- New: Priority visual indicator (colored dot) -->
                        <span id="todo-priority-indicator" data-testid="test-todo-priority-indicator" class="priority-indicator"></span>
                        <span id="todo-priority" data-testid="test-todo-priority" class="priority-pill"></span>
                    </div>

                    <div>
                        <div class="title-area">
                            <h3 id="todo-title" data-testid="test-todo-title" class="task-title"></h3>
                        </div>
                    </div>

                    <!-- Description with expand/collapse -->
                    <div class="desc-wrapper">
                        <div id="todo-collapsible-section" data-testid="test-todo-collapsible-section" class="collapsible-content">
                            <p id="todo-description" data-testid="test-todo-description" class="task-desc"></p>
                        </div>
                        <button type="button" id="todo-expand-toggle" data-testid="test-todo-expand-toggle"
                                class="expand-btn" aria-expanded="false" aria-controls="todo-collapsible-section">
                            <span class="expand-text">Show more</span>
                        </button>
                    </div>

                    <div class="divider"></div>

                    <!-- Date Row -->
                    <div class="date-row">
                        <div>
                            <div class="date-label">Due date</div>
                            <time id="todo-due-date" data-testid="test-todo-due-date" class="date-value"></time>
                        </div>
                        <div id="todo-time-remaining" data-testid="test-todo-time-remaining" class="time-chip" aria-live="polite"></div>
                        <!-- New: Overdue indicator -->
                        <div id="todo-overdue-indicator" data-testid="test-todo-overdue-indicator" class="overdue-badge" style="display: none;"></div>
                    </div>

                    <!-- Status with new control + legacy display badge -->
                    <div class="status-row">
                        <label for="todo-status-control" class="status-label">Status</label>
                        <!-- New: Status control (dropdown) -->
                        <select id="todo-status-control" data-testid="test-todo-status-control" class="status-control">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                        <div id="todo-status" data-testid="test-todo-status" class="status-badge">
                            <span id="status-dot" class="status-dot"></span>
                            <span id="status-text"></span>
                        </div>
                    </div>

                    <!-- Tags -->
                    <ul id="todo-tags" data-testid="test-todo-tags" class="tags-list"></ul>

                </div>

                <!-- EDIT FORM (new inline edit mode) -->
                <div id="todo-edit-form" data-testid="test-todo-edit-form" class="edit-form" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="edit-title-input">Title</label>
                        <input id="edit-title-input" type="text" class="form-input" data-testid="test-todo-edit-title-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edit-description-input">Description</label>
                        <textarea id="edit-description-input" rows="4" class="form-textarea" data-testid="test-todo-edit-description-input"></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="edit-priority-select">Priority</label>
                            <select id="edit-priority-select" class="form-select" data-testid="test-todo-edit-priority-select">
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="edit-due-date-input">Due date</label>
                            <input id="edit-due-date-input" type="datetime-local" class="form-input" data-testid="test-todo-edit-due-date-input">
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button class="btn-cancel" data-testid="test-todo-cancel-button" onclick="cancelEdit()">Cancel</button>
                        <button class="btn-save" data-testid="test-todo-save-button" onclick="saveEdit()">Save changes</button>
                    </div>
                </div>

            </div>

            <!-- Footer (Stage 0 buttons – hidden during edit mode) -->
            <div class="card-footer">
                <button class="btn" onclick="enterEditMode()" data-testid="test-todo-edit-button">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    Edit
                </button>
                <button class="btn btn-danger" onclick="deleteTask()" data-testid="test-todo-delete-button">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14H6L5 6" />
                        <path d="M10 11v6M14 11v6" />
                        <path d="M9 6V4h6v2" />
                    </svg>
                    Delete
                </button>
            </div>
        </article>

        <div id="deleted-notice" class="deleted-notice">
            <div class="deleted-icon">○</div>
            <p class="deleted-text">Task removed. Refresh to restore.</p>
        </div>

        <p class="clock-line">Syncing every 30s &nbsp;·&nbsp; <span id="current-time"></span></p>
    </div>

    <script>
        let task = {
            title: "Launch new product landing page",
            description: "Finalise design assets, integrate analytics, prepare A/B tests, and coordinate with marketing for launch day.",
            priority: "high",
            dueDateISO: "2026-04-25T18:00:00",
            status: "In Progress",
            tags: ["marketing", "launch", "design", "ui"]
        };

        let isDeleted = false;

        const fmt = iso => new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        function timeRemaining(iso) {
            const due = new Date(iso);
            const now = new Date();
            let diff = due - now;
            const isPast = diff < 0;

            if (task.status === "Done") {
                return "Completed";
            }

            const absDiff = Math.abs(diff);
            const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((absDiff % (1000 * 60 * 60)) / (1000 * 60));

            if (isPast) {
                if (days >= 1) return `Overdue by ${days}d`;
                if (hours >= 1) return `Overdue by ${hours}h`;
                if (minutes >= 1) return `Overdue by ${minutes}m`;
                return "Overdue";
            } else {
                if (days >= 2) return `Due in ${days} days`;
                if (days === 1) return `Due in 1 day`;
                if (hours >= 1) return `Due in ${hours} hours`;
                if (minutes >= 1) return `Due in ${minutes} minutes`;
                return "Due now";
            }
        }

        function renderCard() {
            if (isDeleted) return;

            // Title
            document.getElementById('todo-title').textContent = task.title;

            // Description
            const descEl = document.getElementById('todo-description');
            descEl.textContent = task.description;

            // Due date
            document.getElementById('todo-due-date').textContent = fmt(task.dueDateISO);

            // Time remaining (dynamic + "Completed" when done)
            const timeEl = document.getElementById('todo-time-remaining');
            timeEl.textContent = timeRemaining(task.dueDateISO);

            // Priority pill (Stage 0)
            const pEl = document.getElementById('todo-priority');
            const cls = task.priority === 'high' ? 'prio-high' : task.priority === 'medium' ? 'prio-medium' : 'prio-low';
            pEl.className = `priority-pill ${cls}`;
            pEl.innerHTML = `<span class="priority-dot"></span>${task.priority.toUpperCase()}`;

            // New: Priority indicator (colored dot)
            const prioInd = document.getElementById('todo-priority-indicator');
            prioInd.style.backgroundColor = task.priority === 'high' 
                ? 'var(--accent)' 
                : task.priority === 'medium' 
                    ? 'var(--amber)' 
                    : 'var(--sage)';

            // Status control + badge (synced)
            const statusControl = document.getElementById('todo-status-control');
            statusControl.value = task.status;

            const sEl = document.getElementById('todo-status');
            const sdot = document.getElementById('status-dot');
            const stxt = document.getElementById('status-text');

            let badgeCls = '';
            let dotBg = '';
            switch (task.status) {
                case 'Done':
                    badgeCls = 'status-done';
                    dotBg = 'var(--sage)';
                    break;
                case 'In Progress':
                    badgeCls = 'status-inprogress';
                    dotBg = '#3A6EBF';
                    break;
                case 'Pending':
                    badgeCls = 'status-pending';
                    dotBg = 'var(--amber)';
                    break;
            }
            sEl.className = `status-badge ${badgeCls}`;
            sdot.style.backgroundColor = dotBg;
            stxt.textContent = task.status;

            // Checkbox ↔ status sync
            document.getElementById('complete-toggle').checked = task.status === 'Done';
            document.getElementById('todo-card').classList.toggle('completed', task.status === 'Done');

            // Overdue logic
            const due = new Date(task.dueDateISO);
            const now = new Date();
            const isOverdueNow = due < now && task.status !== "Done";
            const overdueEl = document.getElementById('todo-overdue-indicator');
            overdueEl.style.display = isOverdueNow ? 'inline-flex' : 'none';
            if (isOverdueNow) overdueEl.textContent = 'Overdue';
            timeEl.classList.toggle('overdue', isOverdueNow);

            // Expand/collapse logic (default collapsed if long)
            const collapsibleEl = document.getElementById('todo-collapsible-section');
            const toggleBtn = document.getElementById('todo-expand-toggle');
            const isLong = task.description.length > 110;
            if (isLong) {
                collapsibleEl.classList.remove('expanded');
                toggleBtn.style.display = 'flex';
                toggleBtn.setAttribute('aria-expanded', 'false');
                toggleBtn.querySelector('.expand-text').textContent = 'Show more';
            } else {
                collapsibleEl.classList.add('expanded');
                toggleBtn.style.display = 'none';
            }

            // Tags
            const ul = document.getElementById('todo-tags');
            ul.innerHTML = '';
            task.tags.forEach(tag => {
                const li = document.createElement('li');
                li.setAttribute('data-testid', `test-todo-tag-${tag}`);
                li.className = 'tag';
                li.textContent = `#${tag}`;
                ul.appendChild(li);
            });
        }

        function enterEditMode() {
            const viewSection = document.getElementById('view-section');
            const editForm = document.getElementById('todo-edit-form');

            viewSection.style.display = 'none';
            editForm.style.display = 'block';

            // Populate edit form
            document.getElementById('edit-title-input').value = task.title;
            document.getElementById('edit-description-input').value = task.description;
            document.getElementById('edit-priority-select').value = task.priority;
            const dueVal = task.dueDateISO ? task.dueDateISO.substring(0, 16) : '';
            document.getElementById('edit-due-date-input').value = dueVal;

            // Hide footer buttons while editing
            document.querySelectorAll('.card-footer .btn').forEach(btn => {
                btn.style.display = 'none';
            });
        }

        function cancelEdit() {
            const viewSection = document.getElementById('view-section');
            const editForm = document.getElementById('todo-edit-form');

            viewSection.style.display = 'block';
            editForm.style.display = 'none';

            // Restore footer buttons
            document.querySelectorAll('.card-footer .btn').forEach(btn => {
                btn.style.display = '';
            });
        }

        function saveEdit() {
            task.title = document.getElementById('edit-title-input').value.trim() || task.title;
            task.description = document.getElementById('edit-description-input').value.trim() || task.description;
            task.priority = document.getElementById('edit-priority-select').value;

            const dueVal = document.getElementById('edit-due-date-input').value;
            if (dueVal) task.dueDateISO = dueVal + ':00';

            cancelEdit();
            renderCard();
        }

        function deleteTask() {
            if (!confirm("Remove this task?")) return;
            isDeleted = true;
            document.getElementById('todo-card').style.display = 'none';
            document.getElementById('deleted-notice').classList.add('show');
        }

        // Initialize all interactive listeners
        function initListeners() {
            // Checkbox ↔ status sync
            document.getElementById('complete-toggle').addEventListener('change', e => {
                task.status = e.target.checked ? "Done" : "Pending";
                renderCard();
            });

            // Status control (dropdown)
            const statusControl = document.getElementById('todo-status-control');
            statusControl.addEventListener('change', e => {
                task.status = e.target.value;
                renderCard();
            });

            // Expand/collapse toggle (keyboard + aria accessible)
            const expandToggle = document.getElementById('todo-expand-toggle');
            if (expandToggle) {
                expandToggle.addEventListener('click', function () {
                    const collapsible = document.getElementById('todo-collapsible-section');
                    const currentlyExpanded = collapsible.classList.contains('expanded');
                    collapsible.classList.toggle('expanded', !currentlyExpanded);
                    this.setAttribute('aria-expanded', !currentlyExpanded);
                    const textEl = this.querySelector('.expand-text');
                    if (textEl) textEl.textContent = !currentlyExpanded ? 'Show less' : 'Show more';
                });
            }
        }

        // Clock
        function tick() {
            document.getElementById('current-time').textContent =
                new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // Boot
        window.onload = function () {
            initListeners();
            tick();
            setInterval(tick, 1000);
            // Re-render every 30s for live time/overdue updates
            setInterval(() => { if (!isDeleted) renderCard(); }, 30000);
            renderCard();
        };
    </script>
</body>

</html>
